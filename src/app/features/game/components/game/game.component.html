<div class="game-shell" [class.shake]="screenShake">

  <!-- 🔑 HIDDEN INPUT FOR MOBILE -->
  <input #mobileInput
         class="hidden-input"
         type="text"
         autocomplete="off"
         autocorrect="off"
         autocapitalize="off"
         spellcheck="false"
         (input)="onMobileInput($event)" />

  <!-- 🌌 BACKGROUND -->
  <div class="space-bg">
    <div class="grid-overlay"></div>
  </div>

  <!-- 🧠 HUD -->
  <header class="hud-header" *ngIf="gs.gameState === 'playing'">

    <div class="hud-box">
      <div class="label">SCORE</div>
      <div class="value neon">{{ gs.score }}</div>
    </div>

    <div class="timer-orb">
      <div class="time-text">{{ gs.timeLeft }}</div>
    </div>

    <div class="hud-box">
      ❤️ {{ gs.lives }} | 🎯 {{ gs.accuracy }}%
    </div>

  </header>

  <!-- ⚔️ GAME AREA -->
  <main class="battlefield" (click)="focusInput()">

    <!-- WORDS -->
    <div class="word-node"
         *ngFor="let w of gs.words"
         [style.left.%]="w.x"
         [style.top.%]="w.y"
         [class.locked]="w.locked"
         [style.--word-color]="w.color">

      <span *ngFor="let c of w.text.split(''); let i = index"
            [class.typed]="i < w.typedIndex">
        {{ c }}
      </span>
    </div>

    <!-- BULLETS -->
    <div class="bullet"
         *ngFor="let b of gs.bullets"
         [style.left.%]="getBulletX(b)"
         [style.top.%]="getBulletY(b)">
      {{ b.letter }}
    </div>

  </main>

  <!-- 🔫 SNIPER -->
  <footer class="weapon-system">
    <div class="sniper-base">
      <div class="turret"
           [style.transform]="'rotate(' + sniperAngle + 'deg)'">
        <div class="barrel">
          <div class="muzzle-flash" *ngIf="muzzleFlash"></div>
        </div>
      </div>
    </div>
  </footer>

  <!-- 🎮 OVERLAY -->
  <div class="screen-overlay" *ngIf="gs.gameState !== 'playing'">
    <div class="terminal-card">
      <h1>TYPE SNIPER</h1>

      <button (click)="startGame()" class="btn-primary">
        ▶ START
      </button>
    </div>
  </div>

</div>
