<div class="game-container" [class.shake]="screenShake">

  <!-- 🌌 BACKGROUND -->
  <div class="space-bg">
    <div class="stars"></div>
    <div class="grid-overlay"></div>
  </div>

  <!-- 🧠 HUD -->
  <header class="hud-header" *ngIf="gs.gameState === 'playing'">
    
    <div class="hud-box">
      <label>SCORE</label>
      <div class="value">{{ gs.score }}</div>
      <div class="combo" *ngIf="gs.combo > 1">
        {{ gs.combo }}x COMBO
      </div>
    </div>

    <div class="timer-orb">
      <svg viewBox="0 0 100 100">
        <circle class="bg" cx="50" cy="50" r="45"></circle>
        <circle class="progress"
          cx="50" cy="50" r="45"
          [style.stroke-dashoffset]="283 - (gs.timeLeft / 60 * 283)">
        </circle>
      </svg>
      <div class="time-text">{{ gs.timeLeft }}</div>
    </div>

    <div class="hud-box">
      <div>LIVES: {{ gs.lives }}</div>
      <div>ACC: {{ gs.accuracy }}%</div>
    </div>

  </header>

  <!-- ⚔️ BATTLEFIELD -->
  <main class="battlefield">

    <!-- WORDS -->
    <div class="word-node"
         *ngFor="let w of gs.words"
         [style.left.%]="w.x"
         [style.top.%]="w.y"
         [class.locked]="w.locked"
         [style.--word-color]="w.color">

      <span *ngFor="let c of w.text.split(''); let i = index"
            class="char"
            [class.typed]="i < w.typedIndex">
        {{ c }}
      </span>

    </div>

    <!-- BULLETS -->
    <div class="bullet"
         *ngFor="let b of gs.bullets"
         [style.left.%]="getBulletX(b)"
         [style.top.%]="getBulletY(b)">

      {{ b.letter }}

    </div>

  </main>

  <!-- 🔫 SNIPER -->
  <footer class="weapon-system">

    <div class="sniper-base">
      <div class="turret"
           [style.transform]="'rotate(' + sniperAngle + 'deg)'"
           [class.recoil]="isRecoil">

        <div class="barrel">
          <div class="muzzle-flash" *ngIf="muzzleFlash"></div>
        </div>

      </div>
    </div>

  </footer>

  <!-- 🎮 START / GAME OVER -->
  <div class="screen-overlay" *ngIf="gs.gameState !== 'playing'">

    <div class="terminal-card">
      <h1 *ngIf="gs.gameState === 'idle'">TYPE SNIPER</h1>
      <h1 *ngIf="gs.gameState === 'gameover'">MISSION COMPLETE</h1>

      <button (click)="gs.startGame()" class="btn-primary">
        START GAME
      </button>
    </div>

  </div>

</div>
