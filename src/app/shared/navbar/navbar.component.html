<nav class="nav-container" [class.scrolled]="isScrolled">

  <div class="nav-inner">

    <!-- Logo -->
    <a class="logo" routerLink="/">
      <span class="logo-main">Type</span>
      <span class="logo-accent">Dynamics</span>
    </a>

    <!-- Desktop Menu -->
    <ul class="nav-links">
      <li><a routerLink="/">Home</a></li>
      <li><a routerLink="/game">Play</a></li>
      <li><a routerLink="/all-games">Games</a></li>
      <li><a routerLink="/snake-game">Snake</a></li>
      <li><a routerLink="/keyboard">Practice</a></li>
      <li><a routerLink="/typing-blogs">Blogs</a></li>
      <li><a routerLink="/privacy">Privacy</a></li>
      <li><a routerLink="/contact">Contact</a></li>
    </ul>

    <!-- CTA -->
    <button class="cta-btn" routerLink="/game">
      Start Now 
    </button>

    <!-- Hamburger -->
    <div class="hamburger" (click)="toggleMenu()" [class.active]="isMenuOpen">
      <span></span>
      <span></span>
      <span></span>
    </div>

  </div>

  <!-- Mobile Menu -->
  <div class="mobile-menu" [class.open]="isMenuOpen">

    <a routerLink="/" (click)="closeMenu()">Home</a>
    <a routerLink="/game" (click)="closeMenu()">Play</a>
    <a routerLink="/keyboard" (click)="closeMenu()">Practice</a>
    <a routerLink="/typing-blogs" (click)="closeMenu()">Blogs</a>
    <a routerLink="/privacy" (click)="closeMenu()">Privacy</a>
    <a routerLink="/contact" (click)="closeMenu()">Contact</a>

    <button class="cta-btn full" routerLink="/game" (click)="closeMenu()">
      Start Now 
    </button>

  </div>

  <!-- Overlay -->
  <div class="overlay" *ngIf="isMenuOpen" (click)="closeMenu()"></div>

</nav>
