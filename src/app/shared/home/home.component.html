<div class="hero-container d-flex align-items-center justify-content-center">
  <div class="overlay"></div>

  <div class="container text-center position-relative z-2">
    
    <!-- Logo / Title -->
    <h1 class="hero-title mb-3">
      Type<span class="accent">Dynamics</span>
    </h1>

    <!-- Subtitle -->
    <p class="hero-subtitle mb-4">
      Train like a pro. Type faster, sharper, and dominate every keystroke with precision.
    </p>

    <!-- CTA Buttons -->
    <div class="d-flex justify-content-center gap-3 flex-wrap mt-4">
      <button class="btn btn-start" routerLink="/game">
        Start Game
      </button>

      <button class="btn btn-practice" routerLink="/keyboard">
        Practice Mode
      </button>
    </div>

    <!-- Stats Cards -->
    <div class="row stats mt-5 justify-content-center">

      <div class="col-md-3 col-10 stat-card">
        <div class="card-inner">
          <h3>⚡ Speed</h3>
          <p>Real-time WPM tracking</p>
        </div>
      </div>

      <div class="col-md-3 col-10 stat-card">
        <div class="card-inner">
          <h3>🎯 Accuracy</h3>
          <p>Precision-based typing</p>
        </div>
      </div>

      <div class="col-md-3 col-10 stat-card">
        <div class="card-inner">
          <h3>🏆 Compete</h3>
          <p>Challenge your limits</p>
        </div>
      </div>

    </div>

  </div>
</div>
