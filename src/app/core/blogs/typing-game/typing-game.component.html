<!-- typing-game.component.html -->
<div class="container my-5 blog-container">
  <div class="text-center mb-5">
    <h1 class="blog-title">{{ blogTitle }}</h1>
    <p class="text-muted">By {{ author }} | {{ blogDate }}</p>
    <img src="assets/images/blog-header-typing-coding.jpg" alt="Typing Games Boost Coding Skills" class="img-fluid rounded mt-3">
  </div>

  <div *ngFor="let benefit of benefits" class="card mb-4 shadow-sm blog-card">
    <div class="row g-0 align-items-center">
      <div class="col-md-4">
        <img [src]="benefit.image" class="img-fluid rounded-start" [alt]="benefit.title">
      </div>
      <div class="col-md-8">
        <div class="card-body">
          <h4 class="card-title">{{ benefit.title }}</h4>
          <p class="card-text">{{ benefit.description }}</p>
        </div>
      </div>
    </div>
  </div>

  <div class="text-center mt-5">
    <h3>Start Practicing Today!</h3>
    <p>Integrate typing games into your daily routine to enhance coding speed, accuracy, and confidence.</p>
    <a href="/game" class="btn btn-primary btn-lg">Try Typing Games Now</a>
  </div>
</div>
