<!-- typing-challenge.component.html -->
<div class="container my-5 blog-container">
  <div class="text-center mb-5">
    <h1 class="blog-title">{{ blogTitle }}</h1>
    <p class="text-muted">By {{ author }} | {{ blogDate }}</p>
    <img src="assets/images/blog-header-daily-challenges.jpg" alt="Daily Typing Challenges" class="img-fluid rounded mt-3">
  </div>

  <div *ngFor="let challenge of challenges" class="card mb-4 shadow-sm blog-card">
    <div class="row g-0 align-items-center">
      <div class="col-md-4">
        <img [src]="challenge.image" class="img-fluid rounded-start" [alt]="challenge.title">
      </div>
      <div class="col-md-8">
        <div class="card-body">
          <h4 class="card-title">{{ challenge.title }}</h4>
          <p class="card-text">{{ challenge.description }}</p>
        </div>
      </div>
    </div>
  </div>

  <div class="text-center mt-5">
    <h3>Take the Challenge Every Day!</h3>
    <p>Practice these challenges consistently to boost speed, accuracy, and keyboard confidence.</p>
    <a href="/game" class="btn btn-primary btn-lg">Start Daily Challenge Now</a>
  </div>
</div>
