<!-- improve-typing-speed.component.html -->

<div class="container my-5 blog-container">
  <div class="text-center mb-5">
    <h1 class="blog-title">{{ blogTitle }}</h1>
    <p class="text-muted">By {{ author }} | {{ blogDate }}</p>
    <img src="assets/images/blog-header.jpg" alt="Typing Speed Tips" class="img-fluid rounded mt-3">
  </div>

  <div *ngFor="let tip of tips" class="card mb-4 shadow-sm blog-card">
    <div class="row g-0">
      <div class="col-md-4">
        <img [src]="tip.image" class="img-fluid rounded-start" [alt]="tip.title">
      </div>
      <div class="col-md-8">
        <div class="card-body">
          <h4 class="card-title">{{ tip.title }}</h4>
          <p class="card-text">{{ tip.description }}</p>
        </div>
      </div>
    </div>
  </div>

  <div class="text-center mt-5">
    <h3>Start Practicing Today!</h3>
    <p>Follow these tips consistently, and watch your typing speed and accuracy improve drastically.</p>
    <a href="/game" class="btn btn-primary btn-lg">Try Typing Games Now</a>
  </div>
</div>
